<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Red of Ridinghood — 互動敘事地圖</title>
<style>
:root {
  --bg: #0c0810;
  --bg2: #110c16;
  --bg3: #1a1220;
  --text: #e0d8e8;
  --text2: #8878a0;
  --text3: #554868;
  --accent: #dc143c;
  --accent2: #8b0020;
  --accent-glow: rgba(220,20,60,0.15);
  --accent2-glow: rgba(139,0,32,0.15);
  --border: #2a1e38;
  --card: #120d18;
  --card-hover: #1a1224;
  --warm: #d4a017;
  --green: #10b981;
  --purple: #7c3aed;
  --tag-char: #f472b6;
  --tag-loc: #4ade80;
  --tag-action: #f97316;
  --tag-cond: #a78bfa;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; flex-direction: column; }

/* === Game Banner === */
.game-banner {
  background: linear-gradient(135deg, #1a0810 0%, #2a0a14 40%, #120618 80%, #0c0810 100%);
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.game-banner::before {
  content: '';
  position: absolute;
  top: -60%; right: -5%;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(220,20,60,0.1), transparent 60%);
  pointer-events: none;
  animation: pulse-glow 4s ease-in-out infinite;
}
.game-banner::after {
  content: '';
  position: absolute;
  bottom: -40%; left: 15%;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(16,185,129,0.06), transparent 60%);
  pointer-events: none;
}
@keyframes pulse-glow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}
/* Red hood accent line at bottom */
.game-banner .accent-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--warm), var(--accent), transparent);
  opacity: 0.5;
}
.banner-top { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
.banner-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #8b0020);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(220,20,60,0.35);
  position: relative;
}
.banner-icon::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(220,20,60,0.4), transparent);
  z-index: -1;
}
.banner-text h1 {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}
.banner-text h1 .red { color: var(--accent); text-shadow: 0 0 20px rgba(220,20,60,0.4); }
.banner-text .subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
  font-style: italic;
}
.banner-stats {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-top: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  position: relative; z-index: 1;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-item b { color: var(--accent); }
.char-avatars {
  display: flex; gap: 4px; margin-left: auto;
  position: relative; z-index: 1;
}
.char-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.char-avatar:hover {
  transform: scale(1.15);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}
.char-avatar.active {
  border-color: #fff;
  box-shadow: 0 0 16px rgba(220,20,60,0.4);
  transform: scale(1.15);
}

/* === Toolbar === */
.toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex-shrink: 1;
  min-width: 140px;
}
.search-wrap::before {
  content: '\1F50D';
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
  z-index: 1;
}
.search-box {
  padding: 6px 14px 6px 32px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  width: 240px;
  flex-shrink: 1;
  min-width: 140px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap .search-box { width: 100%; padding-left: 32px; }
.search-box:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box::placeholder { color: var(--text3); }
.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toggle-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.toggle-row input { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
.toggle-row:hover { color: var(--text); }
.view-toggle { display: flex; gap: 3px; }
.view-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.view-btn:hover { background: var(--bg3); color: var(--text); }
.view-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(220,20,60,0.3);
}
.filter-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 3px 10px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--text2); color: var(--text); }
.filter-chip.active {
  background: var(--accent2-glow);
  border-color: var(--accent);
  color: var(--accent);
}

/* === Content === */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 60px;
  scroll-behavior: smooth;
}

/* === Group Headers === */
.group-header {
  width: 100%;
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  padding: 14px 20px;
  margin: 16px 0 4px 0;
  border-radius: var(--radius);
  position: sticky;
  top: 0; z-index: 10;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.group-header:first-child { margin-top: 0; }
.group-header:hover { border-color: var(--accent); }
.group-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.npc-portrait {
  width: 40px; height: 40px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--border); flex-shrink: 0;
}
.group-arrow {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.group-arrow.open { transform: rotate(90deg); }
.group-info { flex: 1; min-width: 0; }
.group-header h2 {
  font-size: 16px; font-weight: 600; color: #fff;
  margin: 0; border: none; padding: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-header .group-name-en {
  font-size: 11px; color: var(--text3); margin-top: 1px;
}
.group-header .group-stats {
  font-size: 11px; color: var(--text2); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.group-header .group-stats b { color: var(--accent); }
.group-body { display: none; padding: 2px 0; }
.group-body.open { display: block; }

/* NPC-themed headers */
.group-header[data-theme="hunter"] { background: linear-gradient(135deg, #081a10, var(--bg2)); border-left: 3px solid #22c55e; }
.group-header[data-theme="woodsman"] { background: linear-gradient(135deg, #1a1008, var(--bg2)); border-left: 3px solid #d97706; }
.group-header[data-theme="dinner"] { background: linear-gradient(135deg, #1a0c18, var(--bg2)); border-left: 3px solid #f59e0b; }
.group-header[data-theme="town"] { background: linear-gradient(135deg, #0c1218, var(--bg2)); border-left: 3px solid #06b6d4; }
.group-header[data-theme="endings"] { background: linear-gradient(135deg, #1a0818, var(--bg2)); border-left: 3px solid #ec4899; }
.group-header[data-theme="intro"] { background: linear-gradient(135deg, #1a1020, var(--bg2)); border-left: 3px solid var(--accent); }
.group-header[data-theme="loop"] { background: linear-gradient(135deg, #14100a, var(--bg2)); border-left: 3px solid #a78bfa; }
.group-header[data-theme="misc"] { background: linear-gradient(135deg, #141418, var(--bg2)); border-left: 3px solid #64748b; }
.group-header[data-theme="system"] { background: linear-gradient(135deg, #1e1e24, var(--bg2)); border-left: 3px solid #475569; }

/* === Passage Cards === */
.passage {
  background: var(--card);
  padding: 14px 18px;
  margin: 4px 0;
  border-radius: 8px;
  border-left: 3px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.passage:hover {
  border-left-color: var(--accent);
  background: var(--card-hover);
}
.passage.system-passage { opacity: 0.4; border-left-color: var(--text3); }
.passage-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.passage-title {
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.passage .pid {
  font-size: 10px; color: var(--text3);
  font-family: 'Consolas', monospace; flex-shrink: 0;
}
.passage .tag-row { margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 3px; }
.passage .tag {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
}
.tag-char { background: rgba(244,114,182,0.12); color: var(--tag-char); }
.tag-loc { background: rgba(74,222,128,0.12); color: var(--tag-loc); }
.tag-action { background: rgba(249,115,22,0.12); color: var(--tag-action); }
.tag-cond { background: rgba(167,139,250,0.12); color: var(--tag-cond); }
.tag-default { background: rgba(255,255,255,0.06); color: var(--text2); }
.tag-img { background: rgba(220,20,60,0.1); color: var(--accent); }
.tag-system { background: rgba(100,116,139,0.12); color: #94a3b8; }
.char-pills { margin-bottom: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
.char-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px; font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s;
}
.char-pill:hover { transform: scale(1.05); }
.passage .text {
  font-size: 14px; line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.passage .text p { margin-bottom: 6px; }
.passage .text-en {
  font-size: 12px; color: var(--text2);
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-style: italic; line-height: 1.6;
  white-space: pre-wrap;
  max-height: 120px; overflow: hidden;
  position: relative;
}
.passage .text-en.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(transparent, var(--card));
  pointer-events: none;
}
.passage .choices-row {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 4px;
}
.choice-btn {
  padding: 3px 10px;
  border-radius: 14px;
  background: var(--accent-glow);
  border: 1px solid rgba(220,20,60,0.25);
  color: var(--accent);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.choice-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* === Images in passages === */
.passage-img {
  max-width: 140px; height: auto; border-radius: 6px;
  border: 1px solid var(--border); cursor: pointer;
  transition: transform 0.2s; display: inline-block; margin: 4px 4px 4px 0;
  vertical-align: top;
}
.passage-img:hover { transform: scale(1.05); }
.passage-img.npc-face {
  max-width: 60px; border-radius: 50%; border: 2px solid var(--purple);
}

/* === Lightbox === */
.lightbox-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.88); z-index: 1000;
  justify-content: center; align-items: center; cursor: pointer;
}
.lightbox-overlay.active { display: flex; }
.lightbox-overlay img {
  max-width: 90vw; max-height: 90vh; border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* === Character View === */
.char-section {
  margin: 12px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.char-section-header {
  padding: 14px 18px;
  background: var(--bg2);
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.char-section-header:hover { background: var(--bg3); }
.char-section-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.char-section-info { flex: 1; min-width: 0; }
.char-section-info h3 {
  font-size: 16px; font-weight: 600; color: #fff;
}
.char-section-info .meta {
  font-size: 12px; color: var(--text2);
}
.char-section-body { display: none; }
.char-section-body.open { display: block; padding: 4px 8px 8px; }

/* === Scene View === */
.scene-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 6px 0;
  overflow: hidden;
  transition: border-color 0.2s;
}
.scene-card:hover { border-color: var(--accent); }
.scene-card-header {
  padding: 12px 16px;
  cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 10px;
}
.scene-card-header .scene-title {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
}
.scene-card-header .scene-meta {
  font-size: 11px; color: var(--text2); flex-shrink: 0;
}
.scene-card-body { display: none; padding: 0 16px 12px; }
.scene-card-body.open { display: block; }

/* === Condition Tags in Text === */
.cond-block {
  margin: 8px 0 4px 0;
  padding: 4px 8px;
  border-left: 2px solid var(--tag-cond);
  background: rgba(167,139,250,0.05);
  border-radius: 0 4px 4px 0;
}
.cond-label {
  font-size: 10px;
  color: var(--tag-cond);
  font-family: 'Consolas', monospace;
  margin-bottom: 2px;
}

/* === States === */
.loading {
  text-align: center; padding: 80px 20px; color: var(--text2);
}
.loading .spinner {
  display: inline-block;
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text2); font-size: 14px;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* === Keyboard shortcut hint === */
.kb-hint {
  position: fixed; bottom: 12px; right: 16px;
  font-size: 10px; color: var(--text3);
  pointer-events: none; z-index: 100;
}
.kb-hint kbd {
  padding: 1px 4px; border-radius: 3px;
  background: var(--bg2); border: 1px solid var(--border);
  font-family: inherit;
}

/* === Mobile === */
@media (max-width: 768px) {
  .game-banner { padding: 16px; }
  .banner-text h1 { font-size: 20px; }
  .char-avatars { display: none; }
  .content { padding: 10px 12px 40px; }
  .passage .text { font-size: 15px; line-height: 1.9; }
  .toolbar { padding: 6px 10px; gap: 6px; }
  .search-wrap { width: 100%; }
  .search-box { width: 100%; }
  .toolbar-right { margin-left: 0; width: 100%; flex-wrap: wrap; justify-content: center; }
  .view-toggle { width: 100%; justify-content: center; }
  .filter-row { width: 100%; justify-content: center; }
  .group-header { padding: 10px 14px; }
  .group-header h2 { font-size: 15px; }
  .passage-img { max-width: 100px; }
  .passage-img.npc-face { max-width: 48px; }
  .kb-hint { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <div class="game-banner">
    <div class="accent-line"></div>
    <div class="banner-top">
      <div class="banner-icon">&#x1F9E3;</div>
      <div class="banner-text">
        <h1>Little <span class="red">Red</span> of Ridinghood</h1>
        <div class="subtitle">小紅帽的騎行鎮 — Twine 互動敘事地圖</div>
      </div>
      <div class="char-avatars" id="charAvatars"></div>
    </div>
    <div class="banner-stats" id="bannerStats"></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" class="search-box" id="searchBox" placeholder="搜尋段落、角色、場景...">
    </div>
    <div class="toolbar-right">
      <label class="toggle-row">
        <input type="checkbox" id="showZh" checked>
        <span>中文</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showEn">
        <span>英文</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showChoices" checked>
        <span>選項</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showCond">
        <span>條件</span>
      </label>
      <div class="view-toggle">
        <button class="view-btn active" data-view="narrative" id="viewNarrative">敘事</button>
        <button class="view-btn" data-view="scene" id="viewScene">場景</button>
        <button class="view-btn" data-view="character" id="viewChar">角色</button>
      </div>
    </div>
  </div>

  <div id="filterBar" class="toolbar" style="display:none; padding:4px 16px; border-top:none;">
    <div class="filter-row" id="filterRow"></div>
  </div>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>載入敘事數據中...</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox">
  <img src="" alt="放大圖片" id="lightboxImg">
</div>

<div class="kb-hint">
  <kbd>/</kbd> 搜尋 &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 切換視圖
</div>

<script>
// ============================================================
// Little Red of Ridinghood — Enhanced Narrative Viewer
// ============================================================

// === Constants ===
const CHUNK_SIZE = 60;
const CHAR_COLORS = {
  'Red': '#dc143c',
  'Wolf': '#475569',
  'Hunter': '#22c55e',
  'Woodsman': '#d97706',
  'Mother': '#ec4899',
  'Father': '#3b82f6'
};
const GROUP_ICONS = {
  'intro':    ['#dc143c', '\u{1F3F0}'],
  'loop':     ['#a78bfa', '\u{1F3E0}'],
  'dinner':   ['#f59e0b', '\u{1F37D}'],
  'town':     ['#06b6d4', '\u{1F3D8}'],
  'hunter':   ['#22c55e', '\u{1F3F9}'],
  'woodsman': ['#d97706', '\u{1FA93}'],
  'endings':  ['#ec4899', '\u{2728}'],
  'misc':     ['#64748b', '\u{1F4C4}'],
  'system':   ['#475569', '\u{2699}']
};
const GROUP_NAMES_ZH = {
  'intro': '序章',
  'loop': '日常生活',
  'dinner': '晚餐對話',
  'town': '城鎮與商店',
  'hunter': '獵人',
  'woodsman': '樵夫',
  'endings': '結局',
  'misc': '其他段落',
  'system': '系統'
};

// === State ===
let DATA = null;
let searchQuery = '';
let showZh = true;
let showEn = false;
let showChoices = true;
let showCond = false;
let currentView = 'narrative';
let openSections = new Set();
let charFilter = null;

// === Lightbox ===
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
document.getElementById('lightbox').addEventListener('click', function() {
  this.classList.remove('active');
});

// === Data Loading ===
async function loadData() {
  try {
    const resp = await fetch('data/passages.json?v=' + Date.now());
    DATA = await resp.json();

    // Enrich passages with image & system detection
    DATA.passages.forEach(p => {
      const text = (p.content || '') + (p.name || '');
      p.imgCount = (text.match(/<img\s/gi) || []).length;
      const portraitMatch = text.match(/src="(images\/npcs\/[^"]+)"/);
      p.portrait = portraitMatch ? portraitMatch[1] : '';
      p.is_system = (p.group === 'system') ||
        (!text.trim()) ||
        (/^(StoryInit|StoryCaption|PassageHeader|PassageFooter|StoryMenu)$/i.test(p.name || ''));
    });

    if (!DATA.meta.has_zh) {
      document.getElementById('showZh').parentElement.style.display = 'none';
      showZh = false;
      showEn = true;
      document.getElementById('showEn').checked = true;
    }
    init();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state">載入失敗: ' + e.message + '</div>';
  }
}

// === Banner ===
function renderBanner() {
  const m = DATA.meta;
  const total = m.total || DATA.passages.length;
  const chars = m.characters || [];
  const groups = (DATA.groups || []).length;
  const zhCount = m.translated_count || DATA.passages.filter(p => p.content_zh).length;
  const pct = total > 0 ? Math.round(zhCount / total * 100) : 0;
  const totalChoices = m.total_choices || 0;
  const imgTotal = DATA.passages.reduce((s, p) => s + (p.imgCount || 0), 0);

  document.getElementById('bannerStats').innerHTML =
    `<span class="stat-item"><b>${groups}</b> 分類</span>` +
    `<span class="stat-item"><b>${total.toLocaleString()}</b> 段落</span>` +
    `<span class="stat-item"><b>${totalChoices.toLocaleString()}</b> 選項</span>` +
    `<span class="stat-item"><b>${chars.length}</b> 角色</span>` +
    (imgTotal > 0 ? `<span class="stat-item"><b>${imgTotal}</b> 圖片</span>` : '') +
    `<span class="stat-item" style="color:${pct>=95?'#4ade80':'#fbbf24'}">${pct}% 已翻譯</span>`;

  // Character avatars in banner
  const avatarBox = document.getElementById('charAvatars');
  avatarBox.innerHTML = chars.map(c => {
    const color = CHAR_COLORS[c] || '#64748b';
    return `<div class="char-avatar" style="background:${color}" title="${c}" onclick="filterByChar('${c}')">${c[0]}</div>`;
  }).join('');
}

// === Filtering ===
function getFiltered() {
  let passages = DATA.passages;
  // Hide system passages by default
  passages = passages.filter(p => !p.is_system);
  if (charFilter) {
    passages = passages.filter(p => (p.characters || []).includes(charFilter));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    passages = passages.filter(p =>
      (p.content_zh || '').toLowerCase().includes(q) ||
      (p.content || '').toLowerCase().includes(q) ||
      (p.name || '').toLowerCase().includes(q) ||
      (p.title || '').toLowerCase().includes(q) ||
      (p.group || '').toLowerCase().includes(q) ||
      (p.characters || []).some(c => c.toLowerCase().includes(q))
    );
  }
  return passages;
}

function filterByChar(name) {
  if (charFilter === name) {
    charFilter = null;
  } else {
    charFilter = name;
  }
  // Update avatar active state
  document.querySelectorAll('.char-avatar').forEach(el => {
    el.classList.toggle('active', el.getAttribute('title') === charFilter);
  });
  updateFilterBar();
  resetAndRender();
}

function updateFilterBar() {
  const bar = document.getElementById('filterBar');
  const row = document.getElementById('filterRow');
  if (currentView === 'character' || charFilter) {
    bar.style.display = 'flex';
    const chars = DATA.meta.characters || [];
    row.innerHTML = chars.map(c => {
      const color = CHAR_COLORS[c] || '#64748b';
      const active = charFilter === c ? ' active' : '';
      return `<button class="filter-chip${active}" style="${charFilter===c?`background:${color}22;border-color:${color};color:${color}`:''}" onclick="filterByChar('${c}')">${c}</button>`;
    }).join('') + (charFilter ? `<button class="filter-chip" style="color:var(--warm)" onclick="filterByChar(null);charFilter=null;updateFilterBar();resetAndRender();">清除</button>` : '');
  } else {
    bar.style.display = 'none';
  }
}

// === Passage Title ===
function getPassageTitle(p) {
  if (p.title && p.title.length > 2 && p.title.length < 80) return p.title;
  const name = p.name || '';
  if (name && !/^(g\d|passage_|p\d|#|\d+$)/.test(name) && name.length > 2 && name.length < 80) return name;
  if (p.content_zh) {
    const first = p.content_zh.replace(/<[^>]+>/g, '').replace(/\[.*?\]/g, '').split(/[。！？\n]/)[0].trim();
    if (first.length > 4) return first.length > 50 ? first.substring(0, 47) + '...' : first;
  }
  if (p.content) {
    const first = p.content.replace(/<[^>]+>/g, '').replace(/\[.*?\]/g, '').split(/[.!?\n]/)[0].trim();
    if (first.length > 4) return first.length > 50 ? first.substring(0, 47) + '...' : first;
  }
  return name || 'Passage ' + p.pid;
}

// === Condition Extraction ===
function extractConditions(text) {
  if (!text) return [];
  const conds = [];
  const re = /<<(?:else)?if\s+([^>]+?)>>/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    conds.push(m[1].trim());
  }
  return conds;
}

// === Text Formatting ===
// Extract image sources from raw content for injection into translations
function extractImageSrcs(raw) {
  if (!raw) return [];
  const srcs = [];
  let m;
  const re1 = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
  while ((m = re1.exec(raw)) !== null) srcs.push(m[1]);
  const re2 = /\[img\[([^\]]+?)\](?:\[[^\]]*\])?\]/gi;
  while ((m = re2.exec(raw)) !== null) srcs.push(m[1]);
  return srcs;
}

function formatText(s, extraImgSrcs) {
  if (!s) return '';
  // Extract <img> tags, replace with placeholders
  const imgs = [];
  let safe = s.replace(/<img\s[^>]*>/gi, m => {
    const i = imgs.length;
    let tag = m;
    const srcMatch = tag.match(/src="([^"]+)"/);
    if (srcMatch) {
      const src = srcMatch[1];
      const isFace = /faces\//.test(src);
      const cls = isFace ? 'passage-img npc-face' : 'passage-img';
      if (!/onclick/.test(tag)) {
        tag = tag.replace('<img', `<img onclick="openLightbox('${src}')"`)
      }
      if (/class="/.test(tag)) {
        tag = tag.replace(/class="[^"]*"/, `class="${cls}"`);
      } else {
        tag = tag.replace('<img', `<img class="${cls}"`);
      }
      if (!/loading=/.test(tag)) tag = tag.replace('<img', '<img loading="lazy"');
    }
    imgs.push(tag);
    return `\x00IMG${i}\x00`;
  });

  // Strip [img] [video] markers
  safe = safe.replace(/\[(img|video)\]\s*/gi, '');
  // Strip Twine macros for display
  safe = safe.replace(/<<[^>]*?>>/g, '');
  // Strip [[link]] and ==disabled==
  safe = safe.replace(/\[\[([^\]|]*?)(?:\|[^\]]*?)?\]\]/g, '');
  safe = safe.replace(/==[^=]*?==/g, '');
  // Strip [OR] markers
  safe = safe.replace(/\[OR\]/g, '\n');
  // Clean up excessive whitespace
  safe = safe.replace(/\n{3,}/g, '\n\n').trim();
  // Escape HTML
  let html = escHtml(safe);
  // Restore <img> tags
  html = html.replace(/\x00IMG(\d+)\x00/g, (_, i) => imgs[+i] || '');
  // Markdown image syntax
  html = html.replace(/!\[img\]\(([^)]+)\)/g, (_, src) =>
    `<img src="${src}" class="passage-img" loading="lazy" onclick="openLightbox('${src}')" alt="">`);
  // Twine [img[path]] syntax
  html = html.replace(/\[img\[([^\]]+?)\](?:\[[^\]]*\])?\]/g, (_, src) =>
    `<img src="${src}" class="passage-img" loading="lazy" onclick="openLightbox('${src}')" alt="">`);
  // Inject extra images from English content if none were found in this text
  if (imgs.length === 0 && extraImgSrcs && extraImgSrcs.length > 0) {
    const injected = extraImgSrcs.map(src => {
      const isFace = /faces\//.test(src);
      const cls = isFace ? 'passage-img npc-face' : 'passage-img';
      return `<img src="${escHtml(src)}" class="${cls}" loading="lazy" onclick="openLightbox('${src}')" alt="">`;
    }).join('');
    html = injected + html;
  }
  // Paragraphs
  html = html.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// === Tag Class ===
function tagClass(tag) {
  const t = (tag || '').toLowerCase();
  if (['action', 'loop'].includes(t)) return 'tag-action';
  if (['location', 'town'].includes(t)) return 'tag-loc';
  if (['story', 'dinner', 'intro'].includes(t)) return 'tag-cond';
  if (['hunter', 'woodsman'].includes(t)) return 'tag-char';
  return 'tag-default';
}

// === Passage HTML ===
function passageHtml(p) {
  const title = getPassageTitle(p);
  const pid = p.pid != null ? `<span class="pid">#${p.pid}</span>` : '';
  const sysClass = p.is_system ? ' system-passage' : '';

  // Tags
  const tags = (p.tags && p.tags.length > 0)
    ? `<div class="tag-row">${p.tags.map(t => `<span class="tag ${tagClass(t)}">${escHtml(t)}</span>`).join('')}</div>`
    : '';

  // Image count tag
  let imgTag = '';
  if (p.imgCount > 0) {
    imgTag = `<div class="tag-row"><span class="tag tag-img">${p.imgCount} 張圖</span></div>`;
  }

  // Characters
  const chars = (p.characters && p.characters.length > 0)
    ? `<div class="char-pills">${p.characters.map(c => {
        const color = CHAR_COLORS[c] || '#64748b';
        return `<span class="char-pill" style="background:${color}18;color:${color};border:1px solid ${color}33" onclick="filterByChar('${c}')">${c}</span>`;
      }).join('')}</div>`
    : '';

  // Condition tags
  let condHtml = '';
  if (showCond) {
    const conds = extractConditions(p.content || '');
    if (conds.length > 0) {
      condHtml = `<div class="tag-row">${conds.slice(0, 5).map(c =>
        `<span class="tag tag-cond" title="${escHtml(c)}">${escHtml(c.length > 30 ? c.substring(0,27)+'...' : c)}</span>`
      ).join('')}</div>`;
    }
  }

  // Text
  const TEXT_LIMIT = 5000;
  let textHtml = '';
  const imgSrcs = extractImageSrcs(p.content);
  if (showZh && p.content_zh) {
    const t = p.content_zh.length > TEXT_LIMIT ? p.content_zh.substring(0, TEXT_LIMIT) : p.content_zh;
    const trunc = p.content_zh.length > TEXT_LIMIT ? `<div style="color:var(--tag-cond);font-size:11px;margin-top:4px">... 內容過長，已截斷 (${(p.content_zh.length/1000).toFixed(0)}K 字元)</div>` : '';
    textHtml += `<div class="text">${formatText(t, imgSrcs)}</div>${trunc}`;
  }
  if (showEn && p.content) {
    const t = p.content.length > TEXT_LIMIT ? p.content.substring(0, TEXT_LIMIT) : p.content;
    const trunc = p.content.length > TEXT_LIMIT ? `<div style="color:var(--tag-cond);font-size:11px;margin-top:4px">... truncated (${(p.content.length/1000).toFixed(0)}K chars)</div>` : '';
    if (showZh && p.content_zh) {
      const isLong = t.length > 300;
      textHtml += `<div class="text-en${isLong ? ' collapsed' : ''}">${formatText(t)}</div>${trunc}`;
    } else {
      textHtml += `<div class="text">${formatText(t)}</div>${trunc}`;
    }
  }
  if (!textHtml) {
    textHtml = p.content_zh
      ? `<div class="text">${formatText(p.content_zh.length > TEXT_LIMIT ? p.content_zh.substring(0, TEXT_LIMIT) : p.content_zh, imgSrcs)}</div>`
      : p.content
        ? `<div class="text">${formatText(p.content.length > TEXT_LIMIT ? p.content.substring(0, TEXT_LIMIT) : p.content)}</div>`
        : '<div class="text" style="color:var(--text3)">(empty)</div>';
  }

  // Choices
  const CHOICE_LIMIT = 20;
  let choicesHtml = '';
  if (showChoices && p.choices && p.choices.length > 0) {
    const shown = p.choices.slice(0, CHOICE_LIMIT);
    const overflow = p.choices.length > CHOICE_LIMIT ? `<span style="font-size:11px;color:var(--text2)">+${p.choices.length - CHOICE_LIMIT} 更多</span>` : '';
    choicesHtml = `<div class="choices-row">${shown.map(c =>
      `<span class="choice-btn" title="-> ${escHtml(c.target || '')}">${escHtml(c.text)}</span>`
    ).join('')}${overflow}</div>`;
  }

  return `<div class="passage${sysClass}">
    <div class="passage-header">
      <span class="passage-title">${escHtml(title)}</span>
      ${pid}
    </div>
    ${tags}${imgTag}${condHtml}${chars}${textHtml}${choicesHtml}
  </div>`;
}

// === Chunked Rendering ===
function renderChunked(container, passages, startIdx) {
  const end = Math.min(startIdx + CHUNK_SIZE, passages.length);
  let html = '';
  for (let i = startIdx; i < end; i++) {
    html += passageHtml(passages[i]);
  }
  container.insertAdjacentHTML('beforeend', html);

  if (end < passages.length) {
    const sentinel = document.createElement('div');
    sentinel.className = 'loading';
    sentinel.style.padding = '16px';
    sentinel.innerHTML = `<div style="font-size:11px;color:var(--text3)">載入更多 (${end}/${passages.length})...</div>`;
    container.appendChild(sentinel);

    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        obs.disconnect();
        sentinel.remove();
        renderChunked(container, passages, end);
      }
    });
    obs.observe(sentinel);
  }
}

// === Group passages helper ===
function groupPassages(passages) {
  const groups = new Map();
  passages.forEach(p => {
    const g = p.group || '(uncategorized)';
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(p);
  });
  if (DATA.groups && DATA.groups.length > 0) {
    const ordered = [];
    const seen = new Set();
    DATA.groups.forEach(gi => {
      const key = gi.id || gi.name;
      if (groups.has(key)) { ordered.push([key, groups.get(key)]); seen.add(key); }
    });
    groups.forEach((v, k) => { if (!seen.has(k)) ordered.push([k, v]); });
    return ordered;
  }
  return Array.from(groups.entries()).sort((a, b) => b[1].length - a[1].length);
}

// === Narrative View (by group) ===
function renderNarrativeView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const groups = groupPassages(passages);

  if (groups.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }

  groups.forEach(([gName, gPassages]) => {
    const isOpen = openSections.has('g:' + gName);
    const icon = GROUP_ICONS[gName] || ['#64748b', '\u{1F4C4}'];
    const nameZh = GROUP_NAMES_ZH[gName] || gName;
    const charCount = new Set(gPassages.flatMap(p => p.characters || [])).size;
    const gInfo = (DATA.groups || []).find(g => g.id === gName);
    const displayNameEn = gInfo ? (gInfo.name || gName) : gName;

    // Find portrait for this group
    let portraitHtml = '';
    const firstWithPortrait = gPassages.find(p => p.portrait);
    if (firstWithPortrait) {
      portraitHtml = `<img src="${firstWithPortrait.portrait}" class="npc-portrait" loading="lazy" alt="${gName}">`;
    }

    const header = document.createElement('div');
    header.className = 'group-header';
    header.setAttribute('data-theme', gName);
    header.innerHTML = `
      ${portraitHtml || `<div class="group-icon" style="background:${icon[0]}22;color:${icon[0]}">${icon[1]}</div>`}
      <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      <div class="group-info">
        <h2>${escHtml(nameZh)}</h2>
        <div class="group-name-en">${escHtml(displayNameEn)}</div>
      </div>
      <div class="group-stats">
        ${charCount > 0 ? `<span>${charCount} 角色</span>` : ''}
        <span><b>${gPassages.length}</b> 段落</span>
      </div>
    `;

    const body = document.createElement('div');
    body.className = 'group-body' + (isOpen ? ' open' : '');

    header.addEventListener('click', () => {
      const nowOpen = body.classList.toggle('open');
      header.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('g:' + gName);
        if (!body.dataset.rendered) {
          renderChunked(body, gPassages, 0);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('g:' + gName);
      }
    });

    if (isOpen && !body.dataset.rendered) {
      renderChunked(body, gPassages, 0);
      body.dataset.rendered = '1';
    }

    content.appendChild(header);
    content.appendChild(body);
  });
}

// === Scene View (group -> character sub-groups) ===
function renderSceneView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (passages.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }

  const groups = groupPassages(passages);

  groups.forEach(([gName, gPassages]) => {
    const icon = GROUP_ICONS[gName] || ['#64748b', '\u{1F4C4}'];
    const nameZh = GROUP_NAMES_ZH[gName] || gName;
    const isOpen = openSections.has('sv:' + gName);

    // Sub-group by primary character
    const charSubs = new Map();
    gPassages.forEach(p => {
      const chars = p.characters || [];
      const key = chars.length > 0 ? chars[0] : '(general)';
      if (!charSubs.has(key)) charSubs.set(key, []);
      charSubs.get(key).push(p);
    });
    const subCount = charSubs.size;

    const header = document.createElement('div');
    header.className = 'group-header';
    header.setAttribute('data-theme', gName);
    header.innerHTML = `
      <div class="group-icon" style="background:${icon[0]}22;color:${icon[0]}">${icon[1]}</div>
      <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      <div class="group-info">
        <h2>${escHtml(nameZh)}</h2>
        <div class="group-name-en">${escHtml(gName)} &middot; ${subCount} 子場景</div>
      </div>
      <div class="group-stats"><b>${gPassages.length}</b> 段落</div>
    `;

    const body = document.createElement('div');
    body.className = 'group-body' + (isOpen ? ' open' : '');

    header.addEventListener('click', () => {
      const nowOpen = body.classList.toggle('open');
      header.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('sv:' + gName);
        if (!body.dataset.rendered) {
          renderSceneSubs(body, charSubs, gName);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('sv:' + gName);
      }
    });

    if (isOpen && !body.dataset.rendered) {
      renderSceneSubs(body, charSubs, gName);
      body.dataset.rendered = '1';
    }

    content.appendChild(header);
    content.appendChild(body);
  });
}

function renderSceneSubs(container, charSubs, groupName) {
  const sorted = Array.from(charSubs.entries()).sort((a, b) => {
    if (a[0] === '(general)') return 1;
    if (b[0] === '(general)') return -1;
    return b[1].length - a[1].length;
  });

  sorted.forEach(([charName, subPassages]) => {
    const secKey = 'ss:' + groupName + ':' + charName;
    const isOpen = openSections.has(secKey);
    const color = CHAR_COLORS[charName] || '#64748b';
    const isGeneral = charName === '(general)';
    const choiceCount = subPassages.reduce((s, p) => s + (p.choices || []).length, 0);

    const sub = document.createElement('div');
    sub.className = 'char-section';
    sub.style.margin = '4px 0';
    sub.innerHTML = `
      <div class="char-section-header" style="padding:10px 14px">
        <div class="char-section-avatar" style="background:${color};width:32px;height:32px;font-size:13px">
          ${isGeneral ? '?' : charName[0]}
        </div>
        <div class="char-section-info">
          <h3 style="font-size:14px">${isGeneral ? '一般場景' : escHtml(charName)}</h3>
          <div class="meta">${subPassages.length} 段落${choiceCount > 0 ? ' / ' + choiceCount + ' 選項' : ''}</div>
        </div>
        <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      </div>
    `;

    const subBody = document.createElement('div');
    subBody.className = 'char-section-body' + (isOpen ? ' open' : '');

    sub.querySelector('.char-section-header').addEventListener('click', () => {
      const nowOpen = subBody.classList.toggle('open');
      sub.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add(secKey);
        if (!subBody.dataset.rendered) {
          renderChunked(subBody, subPassages, 0);
          subBody.dataset.rendered = '1';
        }
      } else {
        openSections.delete(secKey);
      }
    });

    if (isOpen && !subBody.dataset.rendered) {
      renderChunked(subBody, subPassages, 0);
      subBody.dataset.rendered = '1';
    }

    sub.appendChild(subBody);
    container.appendChild(sub);
  });
}

// === Character View ===
function renderCharacterView(passages) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const charMap = new Map();
  passages.forEach(p => {
    (p.characters || []).forEach(c => {
      if (!charMap.has(c)) charMap.set(c, []);
      charMap.get(c).push(p);
    });
  });

  const noChar = passages.filter(p => !(p.characters && p.characters.length > 0));

  if (charMap.size === 0 && noChar.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }

  const sorted = Array.from(charMap.entries()).sort((a, b) => b[1].length - a[1].length);

  sorted.forEach(([charName, charPassages]) => {
    if (charFilter && charFilter !== charName) return;

    const isOpen = openSections.has('c:' + charName);
    const color = CHAR_COLORS[charName] || '#64748b';
    const groups = {};
    charPassages.forEach(p => {
      const g = p.group || 'other';
      groups[g] = (groups[g] || 0) + 1;
    });
    const groupStr = Object.entries(groups).map(([k,v]) => `${GROUP_NAMES_ZH[k]||k} ${v}`).join(' / ');

    const section = document.createElement('div');
    section.className = 'char-section';
    section.innerHTML = `
      <div class="char-section-header">
        <div class="char-section-avatar" style="background:${color}">${charName[0]}</div>
        <div class="char-section-info">
          <h3>${escHtml(charName)}</h3>
          <div class="meta">${charPassages.length} 段落 | ${groupStr}</div>
        </div>
        <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      </div>
    `;

    const body = document.createElement('div');
    body.className = 'char-section-body' + (isOpen ? ' open' : '');

    section.querySelector('.char-section-header').addEventListener('click', () => {
      const nowOpen = body.classList.toggle('open');
      section.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('c:' + charName);
        if (!body.dataset.rendered) {
          renderChunked(body, charPassages, 0);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('c:' + charName);
      }
    });

    if (isOpen && !body.dataset.rendered) {
      renderChunked(body, charPassages, 0);
      body.dataset.rendered = '1';
    }

    section.appendChild(body);
    content.appendChild(section);
  });

  // No-character section
  if (noChar.length > 0 && !charFilter) {
    const isOpen = openSections.has('c:__none');
    const section = document.createElement('div');
    section.className = 'char-section';
    section.innerHTML = `
      <div class="char-section-header">
        <div class="char-section-avatar" style="background:var(--text3)">?</div>
        <div class="char-section-info">
          <h3>無特定角色</h3>
          <div class="meta">${noChar.length} 段落</div>
        </div>
        <span class="group-arrow${isOpen ? ' open' : ''}">&#9654;</span>
      </div>
    `;
    const body = document.createElement('div');
    body.className = 'char-section-body' + (isOpen ? ' open' : '');

    section.querySelector('.char-section-header').addEventListener('click', () => {
      const nowOpen = body.classList.toggle('open');
      section.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('c:__none');
        if (!body.dataset.rendered) {
          renderChunked(body, noChar, 0);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('c:__none');
      }
    });
    if (isOpen && !body.dataset.rendered) {
      renderChunked(body, noChar, 0);
      body.dataset.rendered = '1';
    }
    section.appendChild(body);
    content.appendChild(section);
  }
}

// === Render Dispatch ===
function resetAndRender() {
  document.querySelectorAll('[data-rendered]').forEach(el => {
    if (!el.classList.contains('open')) el.dataset.rendered = '';
  });

  const passages = getFiltered();

  switch (currentView) {
    case 'narrative': renderNarrativeView(passages); break;
    case 'scene': renderSceneView(passages); break;
    case 'character': renderCharacterView(passages); break;
  }
}

function setActiveView(view) {
  currentView = view;
  openSections.clear();
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  const btnId = view === 'narrative' ? 'viewNarrative' : view === 'scene' ? 'viewScene' : 'viewChar';
  document.getElementById(btnId).classList.add('active');
  updateFilterBar();
  resetAndRender();
}

// === Init ===
function init() {
  renderBanner();
  updateFilterBar();

  let searchTimeout;
  document.getElementById('searchBox').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = e.target.value.trim();
      openSections.clear();
      resetAndRender();
    }, 300);
  });

  document.getElementById('showZh').addEventListener('change', e => { showZh = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showEn').addEventListener('change', e => { showEn = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showChoices').addEventListener('change', e => { showChoices = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showCond').addEventListener('change', e => { showCond = e.target.checked; openSections.clear(); resetAndRender(); });

  document.getElementById('viewNarrative').addEventListener('click', () => setActiveView('narrative'));
  document.getElementById('viewScene').addEventListener('click', () => setActiveView('scene'));
  document.getElementById('viewChar').addEventListener('click', () => setActiveView('character'));

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '/') { e.preventDefault(); document.getElementById('searchBox').focus(); }
    if (e.key === '1') setActiveView('narrative');
    if (e.key === '2') setActiveView('scene');
    if (e.key === '3') setActiveView('character');
    if (e.key === 'Escape') {
      document.getElementById('searchBox').blur();
      if (charFilter) { charFilter = null; updateFilterBar(); resetAndRender(); }
      // Close lightbox
      document.getElementById('lightbox').classList.remove('active');
    }
  });

  resetAndRender();
}

loadData();
</script>
